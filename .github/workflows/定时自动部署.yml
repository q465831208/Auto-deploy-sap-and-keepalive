name: 定时自动部署SAP节点

on:
  schedule:
    # 每天7点25分自动运行 (UTC时间23:25，北京时间7:25)
    - cron: '25 23 * * *'
    # 每天8点25分自动运行 (UTC时间0:25，北京时间8:25)
    - cron: '25 0 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: '选择部署的节点类型'
        required: true
        default: 'Argo隧道CDN'
        type: choice
        options:
          - ws直连
          - xhttp直连
          - Argo隧道CDN
      app_name:
        description: '应用名称（使用已抢到的容器名称）'
        required: true
        default: 'free-usfheata'
      wait_for_resources:
        description: '是否等待资源可用（建议在非8:20-9:00时间段选择）'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  MEMORY: 512M

jobs:
  deploy-app:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 检查必要的Secrets
      run: |
        echo "🔍 检查必要的Secrets..."
        if [ -z "${{ secrets.EMAIL }}" ]; then
          echo "❌ 缺少 EMAIL secret，请设置SAP账号邮箱"
          exit 1
        fi
        if [ -z "${{ secrets.PASSWORD }}" ]; then
          echo "❌ 缺少 PASSWORD secret，请设置SAP账号密码"
          exit 1
        fi
        echo "✅ 必要的Secrets检查通过"

    - name: Install CF CLI
      run: |
        wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
        echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
        sudo apt-get update
        sudo apt-get install -y cf8-cli

    - name: 设置部署参数
      run: |
        # 使用已抢到的容器名称（定时任务使用默认值，手动触发使用输入值）
        APP_NAME="${{ github.event.inputs.app_name || 'free-usfheata' }}"
        echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
        
        # 根据容器名称判断区域和API端点
        if [[ "$APP_NAME" =~ ^free-us ]]; then
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
          echo "检测到US免费区域容器"
        elif [[ "$APP_NAME" =~ ^free-sg ]]; then
          echo "CF_API=https://api.cf.ap21.hana.ondemand.com" >> $GITHUB_ENV
          echo "检测到SG免费区域容器"
        else
          echo "CF_API=https://api.cf.us10-001.hana.ondemand.com" >> $GITHUB_ENV
          echo "使用默认US区域API端点"
        fi
        
        # 设置部署类型（定时任务使用默认值，手动触发使用输入值）
        TYPE="${{ github.event.inputs.type || 'Argo隧道CDN' }}"
        if [[ -n "${{ secrets.DOCKER_IMAGE }}" ]]; then
          echo "DOCKER_IMAGE=${{ secrets.DOCKER_IMAGE }}" >> $GITHUB_ENV
        else
          if [ "$TYPE" = "ws直连" ]; then
            echo "DOCKER_IMAGE=ghcr.io/eooce/ws:latest" >> $GITHUB_ENV
          elif [ "$TYPE" = "xhttp直连" ]; then
            echo "DOCKER_IMAGE=ghcr.io/eooce/goxhttp:latest" >> $GITHUB_ENV
          else 
            echo "DOCKER_IMAGE=ghcr.io/eooce/nodejs:main" >> $GITHUB_ENV
          fi
        fi
        
        echo "🚀 部署配置:"
        echo "  - API端点: $CF_API"
        echo "  - 应用名称: $APP_NAME"
        echo "  - 部署类型: $TYPE"
        echo "  - Docker镜像: ${{ env.DOCKER_IMAGE }}"

    - name: Login to Cloud Foundry
      run: |
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}"

        # 获取组织列表
        ORG=$(cf orgs | sed -n '4p')
        echo "Selected org: $ORG"
        echo "ORG=$ORG" >> $GITHUB_ENV

        # 获取空间列表
        SPACE=$(cf spaces | sed -n '4p')
        echo "Selected space: $SPACE"
        echo "SPACE=$SPACE" >> $GITHUB_ENV

        # 使用获取的组织和空间重新登录
        cf login -a ${{ env.CF_API }} -u "${{ secrets.EMAIL }}" -p "${{ secrets.PASSWORD }}" -o "$ORG" -s "$SPACE"

        # 检查组织内存限制
        echo "🔍 检查组织内存限制..."
        cf org $ORG
        echo "📊 当前空间内存使用情况:"
        cf space $SPACE
        
        # 检查当前应用状态
        echo "📋 检查当前应用状态:"
        if cf app ${{ env.APP_NAME }} >/dev/null 2>&1; then
          echo "✅ 应用 ${{ env.APP_NAME }} 存在"
          cf app ${{ env.APP_NAME }}
        else
          echo "⚠️ 应用 ${{ env.APP_NAME }} 不存在或未运行"
        fi

    - name: 部署开始日志
      run: |
        echo "🚀 SAP节点部署开始"
        echo "📋 部署信息："
        echo "• 容器名称: ${{ env.APP_NAME }}"
        echo "• 部署类型: ${{ github.event.inputs.type }}"
        echo "• 开始时间: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "• 组织: ${{ env.ORG }}"
        echo "• 空间: ${{ env.SPACE }}"
        echo "⏰ 当前时间: $(date +"%H:%M")"
        echo "📅 资源释放时间段: 8:20-9:00"
        echo "🔧 部署状态：进行中..."

    - name: 直接部署
      run: |
        echo "🚀 定时任务触发，直接开始部署..."
        echo "⏰ 当前时间: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "📅 资源释放时间段: 8:20-9:00"
        echo "💡 定时任务将直接尝试部署，不检查资源可用性"

    - name: 部署节点到容器
      run: |
        echo "🚀 开始部署节点到容器: ${{ env.APP_NAME }}"
        
        # 检查容器是否存在且正在运行
        if cf app ${{ env.APP_NAME }} >/dev/null 2>&1; then
          # 检查应用状态
          APP_STATUS=$(cf app ${{ env.APP_NAME }} | grep "requested state" | awk '{print $3}')
          if [ "$APP_STATUS" = "started" ]; then
            echo "✅ 容器 ${{ env.APP_NAME }} 已存在且正在运行，跳过部署"
            echo "🎉 节点已部署完成，无需重复部署"
            exit 0
          else
            echo "⚠️ 容器 ${{ env.APP_NAME }} 存在但未运行，重新部署..."
            # 先停止应用以释放资源
            echo "🔄 停止现有应用以释放资源..."
            cf stop ${{ env.APP_NAME }} || echo "应用已停止或不存在"
            # 等待一下确保资源释放
            sleep 10
          fi
        else
          echo "⚠️ 容器 ${{ env.APP_NAME }} 不存在，将自动创建新容器..."
        fi
        
        # 直接尝试部署，不等待资源
        echo "🔧 尝试部署节点..."
        
        if cf push ${{ env.APP_NAME }} --docker-image ${{ env.DOCKER_IMAGE }} -m 512M -k 256M --health-check-type port; then
          echo "🎉 部署成功！节点部署完成"
          exit 0
        else
          echo "❌ 部署失败：资源不足"
          echo "💡 建议："
          echo "  1. 等待明天早上8:20-9:00资源释放时间段"
          echo "  2. 检查是否有其他应用占用资源"
          exit 1
        fi
        
    - name: Set environment variables
      run: |
        # 基础环境变量
        cf set-env ${{ env.APP_NAME }} NAME "SAP"
        # 生成随机UUID
        if [ -n "${{ secrets.UUID }}" ]; then
          echo "使用自定义UUID: ${{ secrets.UUID }}"
          cf set-env ${{ env.APP_NAME }} UUID "${{ secrets.UUID }}"
        else
          # 生成随机UUID
          RANDOM_UUID=$(python3 -c "import uuid; print(str(uuid.uuid4()))")
          echo "生成随机UUID: $RANDOM_UUID"
          cf set-env ${{ env.APP_NAME }} UUID "$RANDOM_UUID"
        fi
        cf set-env ${{ env.APP_NAME }} NEZHA_SERVER "${{ secrets.NEZHA_SERVER || 'agent.ylm52.dpdns.org' }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_PORT "${{ secrets.NEZHA_PORT || '80' }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_KEY "${{ secrets.NEZHA_KEY || 'I9Vxqc2g2rfY4Qqcv5guQ5B8vVHncTsh' }}"
        cf set-env ${{ env.APP_NAME }} NEZHA_TLS "${{ secrets.NEZHA_TLS || 'false' }}"
        cf set-env ${{ env.APP_NAME }} ARGO_DOMAIN "${{ secrets.ARGO_DOMAIN || 'us-sap.daili123.dpdns.org' }}"
        cf set-env ${{ env.APP_NAME }} ARGO_AUTH "${{ secrets.ARGO_AUTH || 'eyJhIjoiYWViZTE2OGY2YmM2NmFhZThmMDcwNjY2ZWVkYmJiZDIiLCJ0IjoiOGYwNzFmMGEtMWRkYS00MzQ4LWFhZGMtYjQxM2JkMjdiYzUwIiwicyI6IlptRmtZMlpoWVRNdE9UUmtPUzAwTURrMUxUZzBPVEV0TURZeU9UTTFPRFl6TmpFeSJ9' }}"
        cf set-env ${{ env.APP_NAME }} ARGO_TUNNEL_ID "${{ secrets.ARGO_TUNNEL_ID || '8f071f0a-1dda-4348-aadc-b413bd27bc50' }}"
        cf set-env ${{ env.APP_NAME }} SUB_PATH "${{ secrets.SUB_PATH || '' }}"
        cf set-env ${{ env.APP_NAME }} CFIP "${{ secrets.CFIP || 'cf.877774.xyz' }}"
        cf set-env ${{ env.APP_NAME }} CFPORT "${{ secrets.CFPORT || '' }}"
        # Telegram通知相关环境变量（已禁用）
        # cf set-env ${{ env.APP_NAME }} CHAT_ID "${{ secrets.CHAT_ID }}"
        # cf set-env ${{ env.APP_NAME }} BOT_TOKEN "${{ secrets.BOT_TOKEN }}"

        # 可选：从文件读取环境变量(如果存在)
        if [ -f .env ]; then
          while IFS= read -r line; do
            if [[ ! "$line" =~ ^# ]] && [[ -n "$line" ]]; then
              IFS='=' read -r key value <<< "$line"
              cf set-env ${{ env.APP_NAME }} "$key" "$value"
            fi
          done < .env
        fi

        # 如果 DOCKER_IMAGE 中包含 xhttp、goxhttp、ws 等关键词说明为直连镜像
        if [[ "${{ env.DOCKER_IMAGE }}" =~ (xhttp|goxhttp|ws) ]]; then
          # 获取应用路由
          ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
          if [ -n "$ROUTE" ]; then
            echo "设置 DOMAIN 环境变量为: $ROUTE"
            cf set-env ${{ env.APP_NAME }} DOMAIN "$ROUTE"
          else
            echo "⚠️ 未找到应用路由，无法设置 DOMAIN,请手动将节点里的address、host和sni改为应用域名"
          fi
        fi
        
        echo "✅ 环境变量设置完成"
        
    - name: Restage application
      run: |
        cf restage ${{ env.APP_NAME }}

    - name: Verify deployment
      run: |
        cf app ${{ env.APP_NAME }}
        echo "Deployment completed successfully!"

    - name: 部署失败处理
      if: failure()
      run: |
        echo "❌ 部署失败！"
        echo "📋 失败原因分析："
        echo "  - 可能原因：SAP平台资源不足"
        echo "  - 解决方案：等待明天早上8:20-9:00资源释放时间段"
        echo "  - 或者选择'等待资源可用'选项重新运行"
        echo ""
        echo "⏰ 当前时间: $(date)"
        echo "📅 下次资源释放时间：明天早上8:20-9:00"
        echo "💡 建议：设置定时任务在8:25自动运行"
        
        # 记录失败信息
        echo "❌ SAP节点部署失败"
        echo "📋 失败信息："
        echo "• 容器名称: ${{ env.APP_NAME }}"
        echo "• 部署类型: ${{ github.event.inputs.type }}"
        echo "• 失败时间: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "🔍 失败原因："
        echo "• SAP平台资源不足"
        echo "• 建议等待明天早上8:20-9:00资源释放时间段"
        echo "💡 解决方案："
        echo "• 等待资源释放时间段重新部署"
        echo "• 或选择'等待资源可用'选项"
        echo "📅 下次资源释放时间：明天早上8:20-9:00"

    - name: 部署完成信息
      if: success()
      run: |
        echo "🎉 节点部署完成！详细信息如下："
        echo "容器名称: ${{ env.APP_NAME }}"
        echo "部署类型: ${{ github.event.inputs.type }}"
        echo "组织(ORG): ${{ env.ORG }}"
        echo "空间(SPACE): ${{ env.SPACE }}"

        # 获取应用路由
        ROUTE=$(cf app ${{ env.APP_NAME }} | grep "routes:" | awk '{print $2}')
        if [ -n "$ROUTE" ]; then
          echo "🌐 节点访问地址: https://$ROUTE"
          echo ""
          echo "📋 节点配置信息："
          echo "  - 地址(Address): $ROUTE"
          echo "  - 端口(Port): 443"
          echo "  - 传输协议(Transport): tls"
          echo "  - 网络(Network): ws 或 tcp"
          echo "  - 路径(Path): /"
          echo "  - 主机名(Host): $ROUTE"
          echo "  - SNI: $ROUTE"
          echo ""
          echo "💡 使用说明："
          echo "  1. 将此地址添加到你的代理客户端配置中"
          echo "  2. 选择对应的传输协议和网络类型"
          echo "  3. 确保TLS/SSL设置正确"
          echo "  4. 测试连接是否正常"
        else
          echo "⚠️ 未找到应用路由，请检查部署状态。"
        fi
        
        echo ""
        echo "✅ 节点部署成功！现在可以使用此节点进行网络代理。"
        echo "🔧 如需修改配置，请重新运行此工作流。"
        echo ""
        echo "📅 下次资源释放时间：明天早上8:20-9:00"
        echo "⏰ 建议在此时间段进行部署以获得最佳成功率"
        
        # 记录成功信息
        echo "🎉 SAP节点部署成功！"
        echo "📋 部署信息："
        echo "• 容器名称: ${{ env.APP_NAME }}"
        echo "• 部署类型: ${{ github.event.inputs.type }}"
        echo "• 部署时间: $(date '+%Y-%m-%d %H:%M:%S')"
        echo "• 组织: ${{ env.ORG }}"
        echo "• 空间: ${{ env.SPACE }}"
        echo "🌐 节点配置："
        echo "• 地址: $ROUTE"
        echo "• 端口: 443"
        echo "• 传输协议: tls"
        echo "• 网络: ws 或 tcp"
        echo "• 路径: /"
        echo "• 主机名: $ROUTE"
        echo "• SNI: $ROUTE"
        echo "💡 使用说明："
        echo "• 将此地址添加到代理客户端配置中"
        echo "• 选择对应的传输协议和网络类型"
        echo "• 确保TLS/SSL设置正确"
        echo "• 测试连接是否正常"
        echo "✅ 节点部署成功！现在可以使用此节点进行网络代理。"
        echo "📅 下次资源释放时间：明天早上8:20-9:00"
